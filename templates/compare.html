<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare Scans — CyberScan Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root { --bg:#060c14; --bg2:#0a1220; --bg3:#0f1a2e; --accent:#00c8ff; --accent2:#00ff9d; --accent3:#ff6b35; --text:#a8c4d8; --text2:#3d5a70; --border:rgba(0,200,255,0.12); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Share Tech Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }
  .sidebar { width:220px; background:var(--bg2); border-right:1px solid var(--border); padding:24px 0; flex-shrink:0; }
  .sidebar-logo { padding:0 20px 20px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .sidebar-logo h2 { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:#fff; }
  .sidebar-logo h2 span { color:var(--accent); }
  .sidebar-logo p { font-size:9px; color:var(--text2); }
  .nav-section { padding:6px 20px; font-size:8px; letter-spacing:3px; color:var(--text2); margin-top:10px; }
  .nav-link { display:flex; align-items:center; gap:10px; padding:9px 20px; color:var(--text2); text-decoration:none; font-size:11px; letter-spacing:1px; transition:all 0.2s; border-left:2px solid transparent; }
  .nav-link:hover, .nav-link.active { color:var(--accent); border-left-color:var(--accent); }
  .main { flex:1; padding:32px; overflow-y:auto; }
  .page-eyebrow { font-size:8px; letter-spacing:4px; color:var(--text2); margin-bottom:8px; }
  .page-title { font-family:'Rajdhani',sans-serif; font-size:30px; font-weight:700; color:#fff; margin-bottom:24px; }
  .card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:20px; }
  .card-title { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; color:#fff; margin-bottom:14px; border-bottom:1px solid var(--border); padding-bottom:8px; }
  .select-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  select { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:10px 12px; color:var(--text); font-family:'Share Tech Mono',monospace; font-size:11px; outline:none; }
  select:focus { border-color:var(--accent); }
  .btn { padding:10px 24px; background:rgba(0,200,255,0.1); color:var(--accent); border:1px solid rgba(0,200,255,0.35); border-radius:4px; font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px; cursor:pointer; transition:all 0.2s; }
  .btn:hover { background:rgba(0,200,255,0.2); }
  .compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .compare-col { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:18px; }
  .col-header { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; color:var(--accent); margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .stat-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid rgba(0,200,255,0.05); font-size:11px; }
  .stat-label { color:var(--text2); }
  .stat-val { color:#fff; font-weight:bold; }
  .sev-badge { display:inline-block; padding:2px 10px; border-radius:3px; font-size:10px; font-weight:bold; }
  .Critical { background:rgba(192,0,0,0.2); color:#e74c3c; border:1px solid rgba(192,0,0,0.4); }
  .High { background:rgba(230,100,0,0.2); color:#e67e22; border:1px solid rgba(230,100,0,0.4); }
  .Medium { background:rgba(230,180,0,0.2); color:#f1c40f; border:1px solid rgba(230,180,0,0.4); }
  .Low { background:rgba(0,150,220,0.2); color:#2980b9; border:1px solid rgba(0,150,220,0.4); }
  .winner { color:var(--accent2) !important; }
  .loser { color:#e74c3c !important; }
  .diff-bar { height:6px; border-radius:3px; margin-top:4px; }
  #compare-result { display:none; }
  .verdict { text-align:center; padding:16px; border-radius:6px; margin-bottom:20px; font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; }
  .verdict.safer { background:rgba(0,255,157,0.08); border:1px solid rgba(0,255,157,0.3); color:var(--accent2); }
  .verdict.riskier { background:rgba(255,60,60,0.08); border:1px solid rgba(255,60,60,0.3); color:#e74c3c; }
  .verdict.equal { background:rgba(0,200,255,0.08); border:1px solid rgba(0,200,255,0.3); color:var(--accent); }
  .loading { text-align:center; padding:40px; color:var(--text2); font-size:12px; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <h2>CyberScan<span>Pro</span></h2>
    <p>FUPRE · FYP · OBEH E.O</p>
  </div>
  <div class="nav-section">// NAVIGATION</div>
  <a href="/" class="nav-link">Dashboard</a>
  <a href="/scan/new" class="nav-link">New Scan</a>
  <a href="/compare" class="nav-link active">Compare Scans</a>
  <a href="/schedules" class="nav-link">Schedules</a>
  <a href="/export/csv" class="nav-link">Reports</a>
  <div class="nav-section">// ACCOUNT</div>
  <a href="/logout" class="nav-link">Logout</a>
</aside>

<div class="main">
  <div class="page-eyebrow">// SCAN COMPARISON</div>
  <div class="page-title">Compare Scans</div>

  <!-- Selection -->
  <div class="card">
    <div class="card-title">// SELECT TWO SCANS TO COMPARE</div>
    <div class="select-grid">
      <div>
        <label style="font-size:9px;letter-spacing:3px;color:var(--text2);display:block;margin-bottom:6px;">// SCAN A</label>
        <select id="scan-a">
          <option value="">— Select Scan —</option>
          {% for s in sessions %}
          <option value="{{ s.id }}">{{ s.target }} — {{ s.started_at[:10] }} [{{ s.status }}]</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label style="font-size:9px;letter-spacing:3px;color:var(--text2);display:block;margin-bottom:6px;">// SCAN B</label>
        <select id="scan-b">
          <option value="">— Select Scan —</option>
          {% for s in sessions %}
          <option value="{{ s.id }}">{{ s.target }} — {{ s.started_at[:10] }} [{{ s.status }}]</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <br>
    <button class="btn" onclick="runCompare()">▶ COMPARE SCANS</button>
    <span id="compare-msg" style="margin-left:12px;font-size:10px;color:var(--accent3);"></span>
  </div>

  <!-- Results -->
  <div id="compare-result">
    <div id="verdict-box"></div>
    <div class="compare-grid">
      <div class="compare-col" id="col-a"></div>
      <div class="compare-col" id="col-b"></div>
    </div>
  </div>
</div>

<script>
async function runCompare() {
  const s1 = document.getElementById("scan-a").value;
  const s2 = document.getElementById("scan-b").value;
  const msg = document.getElementById("compare-msg");

  if (!s1 || !s2) { msg.textContent = "Select two scans."; return; }
  if (s1 === s2) { msg.textContent = "Select two different scans."; return; }

  msg.textContent = "Loading...";

  const res  = await fetch(`/api/compare?s1=${s1}&s2=${s2}`);
  const data = await res.json();

  if (data.error) { msg.textContent = data.error; return; }

  msg.textContent = "";
  renderComparison(data.session1, data.session2);
}

function renderComparison(d1, d2) {
  const result = document.getElementById("compare-result");
  result.style.display = "block";

  const t1 = d1.total_findings;
  const t2 = d2.total_findings;

  // Verdict
  const vbox = document.getElementById("verdict-box");
  if (t1 < t2) {
    vbox.innerHTML = `<div class="verdict safer">✅ ${d1.session.target} is SAFER — ${t1} findings vs ${t2} findings</div>`;
  } else if (t2 < t1) {
    vbox.innerHTML = `<div class="verdict riskier">⚠️ ${d2.session.target} is SAFER — ${t2} findings vs ${t1} findings</div>`;
  } else {
    vbox.innerHTML = `<div class="verdict equal">⚡ EQUAL RISK — Both targets have ${t1} findings</div>`;
  }

  // Render columns
  renderCol("col-a", d1, d2, "A");
  renderCol("col-b", d2, d1, "B");
}

function renderCol(id, d, other, label) {
  const col = document.getElementById(id);
  const sc = d.severity_counts;
  const osc = other.severity_counts;

  const safer = (key) => sc[key] <= osc[key] ? "winner" : "loser";

  col.innerHTML = `
    <div class="col-header">// SCAN ${label}: ${d.session.target}</div>
    <div class="stat-row"><span class="stat-label">Date</span><span class="stat-val">${d.session.started_at.substring(0,10)}</span></div>
    <div class="stat-row"><span class="stat-label">Status</span><span class="stat-val">${d.session.status.toUpperCase()}</span></div>
    <div class="stat-row"><span class="stat-label">Hosts Found</span><span class="stat-val">${d.host_count}</span></div>
    <div class="stat-row"><span class="stat-label">Total Findings</span><span class="stat-val ${d.total_findings <= other.total_findings ? 'winner':'loser'}">${d.total_findings}</span></div>
    <div class="stat-row"><span class="stat-label">Web Findings</span><span class="stat-val ${d.web_count <= other.web_count ? 'winner':'loser'}">${d.web_count}</span></div>
    <div class="stat-row"><span class="stat-label">CVE Findings</span><span class="stat-val ${d.cve_count <= other.cve_count ? 'winner':'loser'}">${d.cve_count}</span></div>
    <br>
    <div style="font-size:9px;letter-spacing:3px;color:var(--text2);margin-bottom:10px;">// SEVERITY BREAKDOWN</div>
    ${['Critical','High','Medium','Low'].map(s => `
    <div class="stat-row">
      <span class="stat-label"><span class="sev-badge ${s}">${s}</span></span>
      <span class="stat-val ${safer(s)}">${sc[s] || 0}</span>
    </div>`).join('')}
    <br>
    <a href="/scan/${d.session.id}" style="color:var(--accent);font-size:11px;text-decoration:none;">→ VIEW FULL RESULTS</a>
  `;
}
</script>
</body>
</html>
